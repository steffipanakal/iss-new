<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISS Orbit Tracker</title>
    <style>
        :root {
            --space-dark: #0b0d17;
            --earth-blue: #1a73e8;
            --accent-cyan: #00f2ff;
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--space-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* Subtle star background effect */
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            color: var(--accent-cyan);
        }

        .telemetry {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--earth-blue);
        }

        .coordinate-grid {
            display: flex;
            justify-content: space-around;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: var(--accent-cyan);
        }

        .human-count {
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--earth-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #1557b0;
            transform: translateY(-2px);
        }

        .links {
            margin-top: 20px;
            display: block;
            text-decoration: none;
            color: #888;
            font-size: 0.85rem;
        }

        .links:hover {
            color: var(--accent-cyan);
        }

        /* Pulsing dot indicator */
        .live-indicator {
            height: 8px;
            width: 8px;
            background-color: #ff4b2b;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 75, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div style="font-size: 0.7rem; margin-bottom: 5px;">
            <span class="live-indicator"></span> LIVE TELEMETRY
        </div>
        <h1>ISS Tracker</h1>

        <div class="telemetry">
            <div class="coordinate-grid">
                <div>LAT: {{ iss.latitude }}</div>
                <div>LON: {{ iss.longitude }}</div>
            </div>
            <div class="human-count">
                👨‍🚀 <strong>{{ count }}</strong> humans currently in orbit
            </div>
        </div>

        <form action="/save" method="POST">
            <input type="hidden" name="lat" value="{{ iss.latitude }}">
            <input type="hidden" name="lon" value="{{ iss.longitude }}">
            <input type="text" name="note" placeholder="Add mission log note..." required>
            <button type="submit">Log Snapshot</button>
        </form>

        <a href="/logs" class="links">View Mission History →</a>
    </div>

</body>
</html>
